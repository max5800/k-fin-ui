name: Release

on:
  push:
    branches:
      - main
      - develop

permissions:
  contents: write
  issues: write
  pull-requests: write
  packages: write

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    outputs:
      published: ${{ steps.semantic.outputs.new_release_published }}
      version: ${{ steps.semantic.outputs.new_release_version }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "lts/*"

      - name: Install dependencies
        run: npm ci

      - name: Semantic Release
        id: semantic
        uses: cycjimmy/semantic-release-action@v4
        with:
          extra_plugins: |
            @semantic-release/changelog
            @semantic-release/git
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HUSKY: "0"

  publish:
    name: Publish UI Image
    needs: release
    if: needs.release.outputs.published == 'true'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push UI image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          push: true
          tags: |
            ghcr.io/max5800/k-fin-ui:v${{ needs.release.outputs.version }}
            ghcr.io/max5800/k-fin-ui:latest

  update-fleet:
    name: Pin Fleet UI version
    needs: [release, publish]
    if: needs.release.outputs.published == 'true'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout home-lab
        uses: actions/checkout@v4
        with:
          repository: max5800/home-lab
          token: ${{ secrets.HOME_LAB_PAT }}

      - name: Bump k-fin UI image tag in Fleet bundle
        run: |
          yq e '.helm.values.ui.image.tag = "v${{ needs.release.outputs.version }}"' -i \
            kubernetes/apps/k-fin/app/fleet.yaml

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add kubernetes/apps/k-fin/app/fleet.yaml
          git commit -m "chore(release): bump k-fin-ui to v${{ needs.release.outputs.version }}"
          git push
